<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login | SHEM</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow mx-auto" style="max-width:400px;">
        <h3 class="text-center mb-3">Login</h3>

        <!-- ✅ autocomplete disabled -->
        <form th:action="@{/do-login}" method="post" autocomplete="off">

            <input type="email"
                   name="email"
                   class="form-control mb-3"
                   placeholder="Email"
                   autocomplete="off"
                   required>

            <!-- ✅ forces browser to clear password -->
            <input type="password"
                   name="password"
                   class="form-control mb-3"
                   placeholder="Password"
                   autocomplete="new-password"
                   required>

            <button type="submit" class="btn btn-primary w-100">
                Login
            </button>
        </form>

        <div class="text-center mt-3">
            <a th:href="@{/forgot-password}">Forgot Password?</a><br>
            <a th:href="@{/register}">New User? Register</a>
        </div>

        <p th:if="${param.error}" class="text-danger text-center mt-2">
            Invalid credentials
        </p>

        <p th:if="${param.logout}" class="text-success text-center mt-2">
            Logged out successfully
        </p>

        <p th:if="${param.resetSuccess}" class="text-success text-center mt-2">
            Password reset successful. Please login.
        </p>
    </div>
</div>

</body>
</html>
